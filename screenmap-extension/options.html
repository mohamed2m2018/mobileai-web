<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 18px; }
    p { font-size: 13px; color: #555; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 14px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 9px 11px; border: 1px solid #ccc; border-radius: 8px; font: inherit; font-size: 13px; }
    button { margin-top: 16px; font: inherit; font-weight: 600; border: 0; border-radius: 8px; padding: 10px 18px; background: #6366f1; color: #fff; cursor: pointer; }
    .ok { color: #16a34a; font-weight: 600; font-size: 13px; margin-left: 10px; }
  </style>
</head>
<body>
  <h1>Twomilia Recorder — Setup</h1>
  <p>The easiest way is the <b>Connect extension</b> button in your dashboard (Settings → Train AI on your site). Use this page only if you prefer to paste manually.</p>
  <label>Ingest URL</label>
  <input id="endpoint" placeholder="https://your-dashboard/api/v1/screenmap-ingest" />
  <label>Project key (analyticsKey)</label>
  <input id="key" placeholder="twomilia_pub_…" />
  <div><button id="save">Save</button><span class="ok" id="saved" style="display:none">Saved ✓</span></div>
  <script src="options.js"></script>
</body>
</html>
