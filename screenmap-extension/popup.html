<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; width: 290px; margin: 0; padding: 14px; color: #111; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    button { font: inherit; font-size: 13px; font-weight: 600; border: 0; border-radius: 8px; padding: 10px 16px; cursor: pointer; width: 100%; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .primary { background: #6366f1; color: #fff; }
    .stop { background: #ef4444; color: #fff; }
    .setup-btn { background: #111; color: #fff; margin-top: 8px; }
    .count { font-size: 12px; font-weight: 600; text-align: center; margin-top: 10px; }
    .status { font-size: 12px; color: #555; margin: 8px 0; line-height: 1.4; }
    .ok { color: #16a34a; font-weight: 600; }
    .warn { color: #b45309; }
    a { color: #6366f1; font-size: 11px; cursor: pointer; }
    .foot { margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h1>Twomilia Screen-Map Recorder</h1>
  <div class="status" id="status">…</div>
  <button id="toggle" class="primary" disabled>Start recording</button>
  <button id="setupBtn" class="setup-btn" style="display:none">Set up manually (paste key)</button>
  <div class="count" id="count"></div>
  <div class="foot"><a id="setup">Setup options</a></div>
  <script src="popup.js"></script>
</body>
</html>
